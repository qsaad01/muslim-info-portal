<!DOCTYPE html>
<html>
<head>
  <title>Muslim Info Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      flex: 1;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin: 0 0 10px;
      color: #2980b9;
    }

    .meta {
      font-size: 13px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      margin-right: 5px;
      border-radius: 4px;
      font-size: 12px;
      color: white;
    }

    .gov { background: #27ae60; }
    .ngo { background: #8e44ad; }
    .state { background: #e67e22; }

    .apply-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .apply-btn:hover {
      background: #2980b9;
    }
  </style>
</head>

<body>

<header>
  <h1>Muslim Info Portal</h1>
  <p>Find Government & NGO Schemes Easily</p>
</header>

<div class="container">

  <div class="controls">
    <input type="text" id="search" placeholder="Search schemes...">
    
    <select id="category">
      <option value="">All Categories</option>
      <option value="Government">Government</option>
      <option value="State Government">State Government</option>
      <option value="NGO">NGO</option>
    </select>

    <select id="location">
      <option value="">All Locations</option>
      <option value="India">India</option>
      <option value="Maharashtra">Maharashtra</option>
    </select>
  </div>

  <div id="schemes"></div>

</div>

<script>
let allSchemes = [];

async function loadSchemes() {
  const res = await fetch('/api/schemes');
  allSchemes = await res.json();
  displaySchemes(allSchemes);
}

function displaySchemes(data) {
  const container = document.getElementById('schemes');
  container.innerHTML = '';

  data.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';

    let badgeClass = '';
    if (s.category === 'Government') badgeClass = 'gov';
    else if (s.category === 'NGO') badgeClass = 'ngo';
    else badgeClass = 'state';

    card.innerHTML = `
      <h2>${s.name}</h2>

      <div class="meta">
        <span class="badge ${badgeClass}">${s.category}</span>
        <span class="badge">${s.location}</span>
      </div>

      <p><strong>Provider:</strong> ${s.provider}</p>
      <p><strong>Eligibility:</strong> ${s.eligibility}</p>
      <p>${s.description}</p>

      <a class="apply-btn" href="${s.link}" target="_blank">Apply Now</a>
    `;

    container.appendChild(card);
  });
}

function filterSchemes() {
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('category').value;
  const location = document.getElementById('location').value;

  const filtered = allSchemes.filter(s => {
    return (
      s.name.toLowerCase().includes(search) &&
      (category === '' || s.category === category) &&
      (location === '' || s.location === location)
    );
  });

  displaySchemes(filtered);
}

document.getElementById('search').addEventListener('input', filterSchemes);
document.getElementById('category').addEventListener('change', filterSchemes);
document.getElementById('location').addEventListener('change', filterSchemes);

loadSchemes();
</script>

</body>
</html>
