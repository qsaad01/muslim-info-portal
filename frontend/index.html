<!DOCTYPE html>
<html>
<head>
  <title>Muslim Info Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      flex: 1;
    }

    #resultCount {
      margin-bottom: 10px;
      font-size: 14px;
      color: #555;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin: 0 0 10px;
      color: #2980b9;
    }

    .meta {
      font-size: 13px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      margin-right: 5px;
      border-radius: 4px;
      font-size: 12px;
      color: white;
      background: #95a5a6;
    }

    .gov   { background: #27ae60; }
    .ngo   { background: #8e44ad; }
    .state { background: #e67e22; }

    .contact-box {
      background: #f0f7ff;
      border-left: 4px solid #3498db;
      border-radius: 5px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 13px;
    }

    .contact-box p {
      margin: 4px 0;
      color: #444;
    }

    .contact-box a {
      color: #2980b9;
      text-decoration: none;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    .deadline-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .apply-btn {
      display: inline-block;
      padding: 8px 14px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .apply-btn:hover { background: #2980b9; }

    .whatsapp-btn {
      display: inline-block;
      padding: 8px 14px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }

    .whatsapp-btn:hover { background: #1ebe5d; }

    .no-results {
      text-align: center;
      color: #888;
      margin-top: 20px;
    }

    #pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    .page-btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      min-width: 40px;
    }

    .page-btn:hover  { background: #eaf3fb; }
    .page-btn.active { background: #2980b9; color: white; border-color: #2980b9; }

    #loading {
      text-align: center;
      padding: 30px;
      color: #888;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Muslim Info Portal</h1>
  <p>Find Government &amp; NGO Schemes Easily</p>
</header>

<div class="container">

  <div class="controls">
    <input type="text" id="search" placeholder="Search schemes...">

    <select id="category">
      <option value="">All Categories</option>
      <option value="Government">Government</option>
      <option value="State Government">State Government</option>
      <option value="NGO">NGO</option>
    </select>

    <select id="location">
      <option value="">All Locations</option>
      <option value="India">India</option>
      <option value="Maharashtra">Maharashtra</option>
    </select>
  </div>

  <div id="resultCount"></div>
  <div id="loading">Loading schemes...</div>
  <div id="schemes"></div>
  <div id="pagination"></div>

</div>

<script>
  const LIMIT       = 20;
  let   currentPage = 1;
  let   debounceTimer;

  document.getElementById('search').addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      currentPage = 1;
      fetchSchemes();
    }, 300);
  });

  document.getElementById('category').addEventListener('change', function () {
    currentPage = 1;
    fetchSchemes();
  });

  document.getElementById('location').addEventListener('change', function () {
    currentPage = 1;
    fetchSchemes();
  });

  async function fetchSchemes() {
    const search   = document.getElementById('search').value.trim();
    const category = document.getElementById('category').value;
    const location = document.getElementById('location').value;

    const url = '/api/schemes'
      + '?page='     + currentPage
      + '&limit='    + LIMIT
      + '&search='   + encodeURIComponent(search)
      + '&category=' + encodeURIComponent(category)
      + '&location=' + encodeURIComponent(location);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('schemes').innerHTML     = '';
    document.getElementById('pagination').innerHTML  = '';

    try {
      const res  = await fetch(url);
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      displaySchemes(data.data);
      displayPagination(data.totalPages);

      document.getElementById('resultCount').innerHTML =
        '<p><strong>' + data.total + '</strong> schemes found</p>';

    } catch (err) {
      console.error(err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('schemes').innerHTML =
        '<p class="no-results">Error loading schemes. Please refresh the page.</p>';
    }
  }

  function shareOnWhatsApp(name, link) {
    var message = '*' + name + '*\n\n'
      + 'This scheme may help you or someone you know.\n'
      + 'Apply here: ' + link + '\n\n'
      + '_Shared via Muslim Info Portal_';
    window.open('https://wa.me/?text=' + encodeURIComponent(message), '_blank');
  }

  function displaySchemes(schemes) {
    const container = document.getElementById('schemes');
    container.innerHTML = '';

    if (!schemes || schemes.length === 0) {
      container.innerHTML =
        '<p class="no-results">No schemes found. Try different filters.</p>';
      return;
    }

    schemes.forEach(function (s) {
      let badgeClass = 'state';
      if (s.category === 'Government') badgeClass = 'gov';
      else if (s.category === 'NGO')   badgeClass = 'ngo';

      // Build contact box only if at least one contact field exists
      var contactHtml = '';
      if (s.contact_phone || s.contact_email || s.contact_address) {
        contactHtml = '<div class="contact-box">';
        if (s.contact_name)    contactHtml += '<p><strong>' + s.contact_name + '</strong></p>';
        if (s.contact_phone)   contactHtml += '<p>Phone: <a href="tel:' + s.contact_phone + '">' + s.contact_phone + '</a></p>';
        if (s.contact_email)   contactHtml += '<p>Email: <a href="mailto:' + s.contact_email + '">' + s.contact_email + '</a></p>';
        if (s.contact_address) contactHtml += '<p>Address: ' + s.contact_address + '</p>';
        contactHtml += '</div>';
      }

      // Deadline badge
      var deadlineHtml = '';
      if (s.deadline) {
        var d = new Date(s.deadline);
        var today = new Date();
        var daysLeft = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
        if (daysLeft < 0) {
          deadlineHtml = '<div class="deadline-badge" style="background:#f8d7da;color:#842029;border-color:#f5c2c7;">Expired</div>';
        } else if (daysLeft <= 30) {
          deadlineHtml = '<div class="deadline-badge">Deadline: ' + d.toLocaleDateString('en-IN') + ' (' + daysLeft + ' days left)</div>';
        } else {
          deadlineHtml = '<div class="deadline-badge" style="background:#d1e7dd;color:#0a3622;border-color:#a3cfbb;">Open — ' + d.toLocaleDateString('en-IN') + '</div>';
        }
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<h2>' + s.name + '</h2>' +
        '<div class="meta">' +
          '<span class="badge ' + badgeClass + '">' + s.category + '</span>' +
          '<span class="badge">' + (s.location || '') + '</span>' +
        '</div>' +
        '<p><strong>Provider:</strong> ' + (s.provider || 'N/A') + '</p>' +
        '<p><strong>Eligibility:</strong> ' + (s.eligibility || 'N/A') + '</p>' +
        '<p>' + (s.description || '') + '</p>' +
        deadlineHtml +
        contactHtml +
        '<div class="card-actions">' +
          '<a class="apply-btn" href="' + (s.link || '#') + '" target="_blank">Apply Now</a>' +
          '<button class="whatsapp-btn" onclick="shareOnWhatsApp(\'' +
            s.name.replace(/'/g, '') + '\', \'' + (s.link || '') + '\')">Share on WhatsApp</button>' +
        '</div>';

      container.appendChild(card);
    });
  }

  function displayPagination(totalPages) {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className   = 'page-btn' + (i === currentPage ? ' active' : '');
      btn.addEventListener('click', function () {
        currentPage = i;
        fetchSchemes();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      container.appendChild(btn);
    }
  }

  fetchSchemes();
</script>

</body>
</html>
