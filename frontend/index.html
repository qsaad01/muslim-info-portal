<!DOCTYPE html>
<html>
<head>
  <title>Muslim Info Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin: 0 0 10px;
      color: #2980b9;
    }

    .card p {
      margin: 5px 0;
    }

    .apply-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #27ae60;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .apply-btn:hover {
      background: #219150;
    }
  </style>
</head>
<body>

  <h1>Muslim Info Portal</h1>

  <div class="container" id="schemes"></div>

  <script>
    async function loadSchemes() {
      const response = await fetch('/api/schemes');
      const schemes = await response.json();

      const container = document.getElementById('schemes');
      container.innerHTML = '';

      schemes.forEach(scheme => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h2>${scheme.name}</h2>
          <p><strong>Description:</strong> ${scheme.description}</p>
          <p><strong>Eligibility:</strong> ${scheme.eligibility}</p>
          <a class="apply-btn" href="${scheme.link}" target="_blank">Apply Now</a>
        `;

        container.appendChild(card);
      });
    }

    loadSchemes();
  </script>

</body>
</html>
